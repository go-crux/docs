<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" role="img" aria-labelledby="frequency-tree-title">
  <title id="frequency-tree-title">Metric tree for the Frequency pillar</title>
  <defs>
    <style>
      .bg { fill: #0A1929; }
      .card { fill: #0F2337; stroke: #1E3A54; stroke-width: 1.5; }
      .card-root { fill: #042A4E; stroke: #C87DBB; stroke-width: 2; }
      .card-l1 { fill: #132D47; stroke: #C87DBB; stroke-width: 1.5; }
      .heading { font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace; font-weight: 700; fill: #E4EBF1; }
      .label { font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace; font-weight: 700; fill: #C87DBB; letter-spacing: 0.04em; font-size: 10px; }
      .formula { font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace; font-weight: 400; fill: #C87DBB; font-size: 11px; }
      .body { font-family: 'Inter', system-ui, sans-serif; font-weight: 400; fill: #8BA4B8; }
      .arrow { stroke: #1E3A54; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1100" height="640"/>

  <!-- Title -->
  <text class="heading" x="550" y="40" font-size="18" text-anchor="middle">FREQUENCY METRIC TREE</text>
  <text class="body" x="550" y="62" font-size="12" text-anchor="middle">Cohort-based metrics. Always paired with months_since.</text>

  <!-- Root -->
  <g transform="translate(425, 90)">
    <rect class="card-root" x="0" y="0" width="250" height="64" rx="8"/>
    <text class="label" x="125" y="22" text-anchor="middle">OUTCOME</text>
    <text class="heading" x="125" y="46" font-size="15" text-anchor="middle">REPEAT REVENUE</text>
  </g>

  <!-- Lines down -->
  <path class="arrow" d="M 550 154 L 550 175"/>
  <path class="arrow" d="M 550 175 L 200 175 L 200 196"/>
  <path class="arrow" d="M 550 175 L 550 196"/>
  <path class="arrow" d="M 550 175 L 900 175 L 900 196"/>

  <!-- L1: three core metrics -->
  <g transform="translate(80, 200)">
    <rect class="card-l1" x="0" y="0" width="240" height="100" rx="8"/>
    <text class="label" x="120" y="22" text-anchor="middle">CORE METRIC</text>
    <text class="heading" x="120" y="44" font-size="13" text-anchor="middle">Repurchase Rate</text>
    <text class="heading" x="120" y="60" font-size="11" text-anchor="middle">(Median Order Time)</text>
    <text class="body" x="120" y="78" font-size="10" text-anchor="middle">Are customers coming back</text>
    <text class="body" x="120" y="90" font-size="10" text-anchor="middle">in the desired timeframe?</text>
  </g>

  <g transform="translate(430, 200)">
    <rect class="card-l1" x="0" y="0" width="240" height="100" rx="8"/>
    <text class="label" x="120" y="22" text-anchor="middle">CORE METRIC</text>
    <text class="heading" x="120" y="46" font-size="14" text-anchor="middle">Active Customer Base</text>
    <text class="body" x="120" y="68" font-size="10" text-anchor="middle">Are customers remaining</text>
    <text class="body" x="120" y="82" font-size="10" text-anchor="middle">active after their 2nd order?</text>
  </g>

  <g transform="translate(780, 200)">
    <rect class="card-l1" x="0" y="0" width="240" height="100" rx="8"/>
    <text class="label" x="120" y="22" text-anchor="middle">REVENUE LENS</text>
    <text class="heading" x="120" y="44" font-size="13" text-anchor="middle">avg revenue per customer</text>
    <text class="body" x="120" y="68" font-size="10" text-anchor="middle">How much revenue does</text>
    <text class="body" x="120" y="82" font-size="10" text-anchor="middle">each cohort generate?</text>
  </g>

  <!-- Lines down to leading indicator section -->
  <path class="arrow" d="M 550 300 L 550 330"/>

  <!-- Leading indicator banner -->
  <g transform="translate(350, 335)">
    <rect class="card" x="0" y="0" width="400" height="50" rx="8"/>
    <text class="heading" x="200" y="32" font-size="13" text-anchor="middle">LEADING INDICATOR: repeat_orders</text>
  </g>

  <!-- Line down to dimensions -->
  <path class="arrow" d="M 550 385 L 550 415"/>

  <!-- Dimensions header -->
  <g transform="translate(350, 425)">
    <rect class="card-l1" x="0" y="0" width="400" height="50" rx="8"/>
    <text class="heading" x="200" y="32" font-size="14" text-anchor="middle">DIMENSIONS TO SLICE BY</text>
  </g>

  <!-- Branch lines down to 5 dimensions -->
  <path class="arrow" d="M 550 475 L 550 495"/>
  <path class="arrow" d="M 550 495 L 130 495 L 130 515"/>
  <path class="arrow" d="M 550 495 L 340 495 L 340 515"/>
  <path class="arrow" d="M 550 495 L 550 515"/>
  <path class="arrow" d="M 550 495 L 760 495 L 760 515"/>
  <path class="arrow" d="M 550 495 L 970 495 L 970 515"/>

  <!-- Dimension cards -->
  <g transform="translate(45, 520)">
    <rect class="card" x="0" y="0" width="170" height="90" rx="6"/>
    <text class="heading" x="85" y="28" font-size="12" text-anchor="middle">country</text>
    <text class="body" x="85" y="50" font-size="10" text-anchor="middle">Geography of the</text>
    <text class="body" x="85" y="62" font-size="10" text-anchor="middle">customer</text>
  </g>

  <g transform="translate(255, 520)">
    <rect class="card" x="0" y="0" width="170" height="90" rx="6"/>
    <text class="heading" x="85" y="28" font-size="12" text-anchor="middle">order_type</text>
    <text class="body" x="85" y="50" font-size="10" text-anchor="middle">Subscription vs</text>
    <text class="body" x="85" y="62" font-size="10" text-anchor="middle">one-off acquisition</text>
  </g>

  <g transform="translate(465, 520)">
    <rect class="card" x="0" y="0" width="170" height="90" rx="6"/>
    <text class="heading" x="85" y="28" font-size="12" text-anchor="middle">order_category</text>
    <text class="body" x="85" y="50" font-size="10" text-anchor="middle">Starter, refill,</text>
    <text class="body" x="85" y="62" font-size="10" text-anchor="middle">bundle, etc.</text>
  </g>

  <g transform="translate(675, 520)">
    <rect class="card" x="0" y="0" width="170" height="90" rx="6"/>
    <text class="heading" x="85" y="28" font-size="12" text-anchor="middle">channel</text>
    <text class="body" x="85" y="50" font-size="10" text-anchor="middle">Acquisition channel</text>
    <text class="body" x="85" y="62" font-size="10" text-anchor="middle">of the cohort</text>
  </g>

  <g transform="translate(885, 520)">
    <rect class="card" x="0" y="0" width="170" height="90" rx="6"/>
    <text class="heading" x="85" y="28" font-size="12" text-anchor="middle">discount_usage</text>
    <text class="body" x="85" y="50" font-size="10" text-anchor="middle">Acquired with code</text>
    <text class="body" x="85" y="62" font-size="10" text-anchor="middle">vs at full price</text>
  </g>
</svg>
